# .NET Build & Test Workflow
# This workflow builds and tests the .NET project on push and pull request

name: ".NET Build & Test"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore ./src/src.sln
      - name: Build
        run: dotnet build --no-restore --configuration Release ./src/src.sln
      - name: Test
        run: dotnet test --no-build --verbosity normal ./src/src.sln
